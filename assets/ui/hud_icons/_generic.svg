<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bgG" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4a5870"/>
      <stop offset="100%" stop-color="#1e2530"/>
    </radialGradient>
  </defs>
  <!-- Background tile -->
  <rect x="4" y="4" width="24" height="24" rx="4"
        fill="url(#bgG)" stroke="#6a7a90" stroke-width="1.5"/>
