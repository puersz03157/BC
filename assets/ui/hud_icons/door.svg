<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="doorG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c08848"/>
      <stop offset="100%" stop-color="#6a3e18"/>
    </linearGradient>
    <linearGradient id="panelG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a87038"/>
      <stop offset="100%" stop-color="#5a3010"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="30" rx="9" ry="2" fill="black" opacity="0.16"/>
  <!-- Door frame -->
  <rect x="7" y="4" width="18" height="26" rx="1.5" fill="#3a2010" stroke="#1e1008" stroke-width="1"/>
  <!-- Door slab -->
  <rect x="8.5" y="5" width="15" height="24" rx="1" fill="url(#doorG)" stroke="#3a2010" stroke-width="0.8"/>
  <!-- Door plank lines -->
  <line x1="8.5" y1="14" x2="23.5" y2="14" stroke="#4a2810" stroke-width="0.9" opacity="0.5"/>
  <line x1="8.5" y1="20" x2="23.5" y2="20" stroke="#4a2810" stroke-width="0.9" opacity="0.5"/>
  <!-- Upper panel inset -->
  <rect x="10" y="6.5" width="12" height="6.5" rx="1" fill="url(#panelG)" stroke="#3a2010" stroke-width="0.7"/>
  <!-- Lower panel inset -->
  <rect x="10" y="21" width="12" height="6.5" rx="1" fill="url(#panelG)" stroke="#3a2010" stroke-width="0.7"/>
  <!-- Door knob -->
  <circle cx="21" cy="17" r="2.2" fill="#d4aa28" stroke="#8a7010" stroke-width="1"/>
  <circle cx="20.3" cy="16.3" r="0.8" fill="white" opacity="0.5"/>
  <!-- Highlight strip on door edge -->
  <rect x="9.5" y="5.5" width="2" height="22" rx="1" fill="white" opacity="0.14"/>
</svg>
