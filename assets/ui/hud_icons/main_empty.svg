  <path d="M22 5 L27 5 L27 10" stroke="#a0b8d0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M5 22 L5 27 L10 27" stroke="#a0b8d0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M22 27 L27 27 L27 22" stroke="#a0b8d0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Faint centre dot -->
