<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="plank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0985a"/>
      <stop offset="100%" stop-color="#7a4e28"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="28" rx="12" ry="2.5" fill="black" opacity="0.15"/>
  <!-- Floor base -->
  <rect x="4" y="9" width="24" height="16" rx="2" fill="url(#plank)" stroke="#3a2010" stroke-width="1.2"/>
  <!-- Horizontal plank divider -->
  <line x1="4" y1="17" x2="28" y2="17" stroke="#3a2010" stroke-width="1" opacity="0.55"/>
  <!-- Vertical plank dividers (offset top vs bottom for realistic planking) -->
  <line x1="14" y1="9"  x2="14" y2="17" stroke="#3a2010" stroke-width="0.9" opacity="0.45"/>
  <line x1="22" y1="9"  x2="22" y2="17" stroke="#3a2010" stroke-width="0.9" opacity="0.45"/>
  <line x1="10" y1="17" x2="10" y2="25" stroke="#3a2010" stroke-width="0.9" opacity="0.45"/>
  <line x1="20" y1="17" x2="20" y2="25" stroke="#3a2010" stroke-width="0.9" opacity="0.45"/>
  <!-- Grain lines top row -->
  <line x1="5"  y1="13" x2="13" y2="13" stroke="#8a6030" stroke-width="0.7" opacity="0.35"/>
  <line x1="15" y1="11" x2="21" y2="11" stroke="#8a6030" stroke-width="0.7" opacity="0.35"/>
  <!-- Top-left highlight -->
  <rect x="5" y="10" width="7" height="5" rx="1" fill="white" opacity="0.12"/>
</svg>
