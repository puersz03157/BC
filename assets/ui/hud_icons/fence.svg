<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="post" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c08848"/>
      <stop offset="100%" stop-color="#6a4020"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a87038"/>
      <stop offset="100%" stop-color="#5a3018"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="29" rx="12" ry="2" fill="black" opacity="0.14"/>
  <!-- Left post (pointed top) -->
  <polygon points="7,7 10,4 13,7" fill="url(#post)" stroke="#3a2010" stroke-width="1"/>
  <rect x="7" y="7" width="6" height="19" rx="1" fill="url(#post)" stroke="#3a2010" stroke-width="1"/>
  <!-- Centre post (pointed top) -->
  <polygon points="13.5,9 16,6 18.5,9" fill="url(#post)" stroke="#3a2010" stroke-width="1"/>
  <rect x="13.5" y="9" width="5" height="17" rx="1" fill="url(#post)" stroke="#3a2010" stroke-width="1"/>
  <!-- Right post (pointed top) -->
  <polygon points="19,7 22,4 25,7" fill="url(#post)" stroke="#3a2010" stroke-width="1"/>
  <rect x="19" y="7" width="6" height="19" rx="1" fill="url(#post)" stroke="#3a2010" stroke-width="1"/>
  <!-- Rails -->
  <rect x="5" y="12" width="22" height="3" rx="1.5" fill="url(#rail)" stroke="#3a2010" stroke-width="1"/>
  <rect x="5" y="19" width="22" height="3" rx="1.5" fill="url(#rail)" stroke="#3a2010" stroke-width="1"/>
  <!-- Post highlights -->
  <rect x="8"  y="8"  width="1.5" height="15" rx="0.5" fill="white" opacity="0.18"/>
  <rect x="20" y="8"  width="1.5" height="15" rx="0.5" fill="white" opacity="0.18"/>
</svg>
