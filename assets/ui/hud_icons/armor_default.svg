<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="armorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6888b8"/>
      <stop offset="100%" stop-color="#2a3e60"/>
    </linearGradient>
    <linearGradient id="shoulderG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7898c8"/>
      <stop offset="100%" stop-color="#384870"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="30" rx="10" ry="2" fill="black" opacity="0.15"/>
  <!-- Left shoulder pad -->
  <path d="M4 12 Q4 7 9 7 L12 9 L11 15 L5 16 Z"
        fill="url(#shoulderG)" stroke="#1e2e48" stroke-width="1.1"/>
  <!-- Right shoulder pad -->
  <path d="M28 12 Q28 7 23 7 L20 9 L21 15 L27 16 Z"
        fill="url(#shoulderG)" stroke="#1e2e48" stroke-width="1.1"/>
  <!-- Chest plate -->
  <path d="M10 9 L22 9 L24 14 L24 27 L8 27 L8 14 Z"
        fill="url(#armorG)" stroke="#1e2e48" stroke-width="1.2"/>
  <!-- Chest centre line -->
  <line x1="16" y1="10" x2="16" y2="27" stroke="#1e2e48" stroke-width="0.9" opacity="0.45"/>
  <!-- Chest panel inset -->
  <rect x="11" y="13" width="10" height="10" rx="1.5"
        fill="#2a3e60" stroke="#1e2e48" stroke-width="0.8" opacity="0.7"/>
  <!-- Rivets -->
  <circle cx="11" cy="11" r="1.2" fill="#a0b4cc" stroke="#1e2e48" stroke-width="0.6"/>
  <circle cx="21" cy="11" r="1.2" fill="#a0b4cc" stroke="#1e2e48" stroke-width="0.6"/>
  <!-- Highlight on chest -->
  <path d="M10 10 L16 10 L16 13 L11 13 Z" fill="white" opacity="0.18"/>
</svg>
