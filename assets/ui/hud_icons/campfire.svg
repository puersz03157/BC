<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#f0a030" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0a030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8e040"/>
      <stop offset="50%" stop-color="#f07020"/>
      <stop offset="100%" stop-color="#c03810"/>
    </linearGradient>
    <linearGradient id="log" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5020"/>
      <stop offset="100%" stop-color="#4a2808"/>
    </linearGradient>
  </defs>
  <!-- Ambient glow -->
  <ellipse cx="16" cy="22" rx="13" ry="8" fill="url(#glow)"/>
  <!-- Logs (X shape) -->
  <rect x="6" y="22" width="20" height="5" rx="2.5" fill="url(#log)" stroke="#2e1608" stroke-width="1.1"
        transform="rotate(-18 16 24.5)"/>
  <rect x="6" y="22" width="20" height="5" rx="2.5" fill="url(#log)" stroke="#2e1608" stroke-width="1.1"
        transform="rotate(18 16 24.5)"/>
  <!-- Ember glow under flame -->
  <ellipse cx="16" cy="22" rx="6" ry="3" fill="#f06020" opacity="0.6"/>
  <!-- Outer flame -->
  <path d="M16 22 L10 14 L12 8 L16 4 L20 8 L22 14 Z"
        fill="url(#flame)" stroke="#c03810" stroke-width="0.8" opacity="0.9"/>
  <!-- Inner flame (bright) -->
  <path d="M16 21 L13 15 L15 10 L16 7 L17 10 L19 15 Z"
        fill="#f8e060" opacity="0.85"/>
  <!-- Highlight tip -->
  <ellipse cx="16" cy="8" rx="1.5" ry="3" fill="white" opacity="0.35"/>
</svg>
