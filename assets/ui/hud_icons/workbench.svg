<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c89050"/>
      <stop offset="100%" stop-color="#7a4e28"/>
    </linearGradient>
    <linearGradient id="leg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5a30"/>
      <stop offset="100%" stop-color="#4a2e10"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="30" rx="11" ry="2" fill="black" opacity="0.16"/>
  <!-- Legs -->
  <rect x="7" y="20" width="4" height="10" rx="1.5" fill="url(#leg)" stroke="#2e1808" stroke-width="1"/>
  <rect x="21" y="20" width="4" height="10" rx="1.5" fill="url(#leg)" stroke="#2e1808" stroke-width="1"/>
  <!-- Cross brace -->
  <rect x="7" y="24" width="18" height="2.5" rx="1" fill="#5a3a18" stroke="#2e1808" stroke-width="0.8"/>
  <!-- Table top -->
  <rect x="4" y="13" width="24" height="8" rx="2" fill="url(#top)" stroke="#3a2010" stroke-width="1.2"/>
  <!-- Plank lines on top -->
  <line x1="4" y1="17" x2="28" y2="17" stroke="#5a3820" stroke-width="0.9" opacity="0.5"/>
  <!-- Tool on table: small hammer -->
  <rect x="10" y="8" width="3" height="6" rx="1" fill="#8a9aaa" stroke="#38485a" stroke-width="0.8"/>
  <rect x="8" y="7" width="7" height="3" rx="1" fill="#707888" stroke="#38485a" stroke-width="0.8"/>
  <!-- Tool highlight -->
  <rect x="9" y="7.5" width="2" height="2" rx="0.5" fill="white" opacity="0.25"/>
</svg>
