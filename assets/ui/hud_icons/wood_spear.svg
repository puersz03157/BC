<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c88a40"/>
      <stop offset="100%" stop-color="#6a3c14"/>
    </linearGradient>
    <linearGradient id="tip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8c4d0"/>
      <stop offset="100%" stop-color="#506070"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="29" rx="10" ry="2" fill="black" opacity="0.14"/>
  <!-- Shaft diagonal bottom-left → top-right -->
  <line x1="6" y1="27" x2="23" y2="7" stroke="url(#shaft)" stroke-width="4" stroke-linecap="round"/>
  <!-- Shaft highlight -->
  <line x1="7" y1="26" x2="22" y2="8" stroke="white" stroke-width="1.2" opacity="0.18" stroke-linecap="round"/>
  <!-- Binding at tip -->
  <line x1="19" y1="11" x2="22" y2="8" stroke="#6a3c14" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Stone tip -->
  <path d="M23 7 L19 10 L21 13 L27 8 Z"
        fill="url(#tip)" stroke="#384048" stroke-width="1.1"/>
  <!-- Tip highlight -->
  <path d="M23 7 L20 9 L22 11 L26 8 Z" fill="white" opacity="0.25"/>
  <!-- Tip glint -->
  <line x1="25" y1="7.5" x2="27" y2="9" stroke="#dce8f0" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
</svg>
