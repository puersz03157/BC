<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="cookedG" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#b85828"/>
      <stop offset="100%" stop-color="#4a1808"/>
    </radialGradient>
    <linearGradient id="charG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1808"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="29" rx="11" ry="2" fill="black" opacity="0.15"/>
  <!-- Bone -->
  <line x1="22" y1="5" x2="28" y2="11" stroke="#d8c8b0" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="22" cy="5"  r="3"   fill="#d8c8b0" stroke="#a09080" stroke-width="0.9"/>
  <circle cx="28" cy="11" r="3"   fill="#d8c8b0" stroke="#a09080" stroke-width="0.9"/>
  <!-- Cooked meat body -->
  <path d="M6 16 Q6 9 12 8 Q19 7 23 12 Q27 17 24 22 Q21 27 14 26 Q7 25 6 20 Z"
        fill="url(#cookedG)" stroke="#2a1008" stroke-width="1.2"/>
  <!-- Char / grill marks -->
