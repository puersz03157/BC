  <path d="M9 18 Q14 16 19 19"  stroke="url(#charG)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <!-- Juicy gloss -->
  <ellipse cx="12" cy="12" rx="3.5" ry="2.5" fill="white" opacity="0.18"/>
  <!-- Heat wisps -->
  <path d="M11 6 Q10 3 12 2 Q11 4 13 3" stroke="#f0a020" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M16 5 Q15 2 17 1 Q16 3 18 2" stroke="#f0a020" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>
</svg>
